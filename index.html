<form id="memberForm">
  <input name="name" placeholder="姓名"><br>
  <input name="idNumber" placeholder="身份證字號"><br>
  <input name="phone" placeholder="手機"><br>
  <input name="birthday" placeholder="生日"><br>
  <input name="address" placeholder="地址"><br>
  <button type="submit">送出</button>
</form>

<script>
  const userId = "LINE_USER_ID"; // 實際綁定後取值

  document.getElementById("memberForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = {
      userId: userId,
      name: formData.get("name"),
      idNumber: formData.get("idNumber"),
      phone: formData.get("phone"),
      birthday: formData.get("birthday"),
      address: formData.get("address")
    };

    fetch("你的GAS網址", {
      method: "POST",
      body: JSON.stringify(data),
      headers: { "Content-Type": "application/json" }
    })
    .then(res => res.json())
    .then(res => {
      alert("會員資料已送出！LINE ID：" + res.userId);
    });
  });
</script>
