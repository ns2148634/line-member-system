<!-- LINE Login SDK -->
<script src="https://d.line-scdn.net/liff/2.1/sdk.js"></script>
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>加入會員</title>
</head>
<body>
  <h2>加入會員</h2>
  <form id="memberForm">
    <label>姓名：<input type="text" name="name" required></label><br>
    <label>身份證字號：<input type="text" name="id" required></label><br>
    <label>手機：<input type="tel" name="phone" required></label><br>
    <label>生日：<input type="date" name="birthday" required></label><br>
    <label>地址：<input type="text" name="address" required></label><br><br>
    <button type="submit">送出</button>
  </form>

  <p id="response"></p>

  <script>
    document.getElementById("memberForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const form = e.target;
      const data = new FormData(form);

      fetch("https://script.google.com/macros/s/AKfycbysarFiR7QFoMMRONUlWadd2zrA-N13DgM95Cp1qDloblBAzCeZw4zQpnIuv5q3hgai/exec", {
        method: "POST",
        body: data,
      })
      .then(res => res.text())
      .then(txt => {
        document.getElementById("response").innerText = "送出成功！";
        form.reset();
      })
      .catch(err => {
        document.getElementById("response").innerText = "發生錯誤：" + err;
      });
    });
  </script>
</body>
</html>
