<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>LINE 綁定會員</title>
</head>
<body>
  <h1>使用 LINE 登入綁定會員</h1>
  <button id="login">使用 LINE 登入</button>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const LIFF_ID = "2007283855-1xxdgEdy";
    const API_URL = "https://script.google.com/macros/s/AKfycbysarFiR7QFoMMRONUlWadd2zrA-N13DgM95Cp1qDloblBAzCeZw4zQpnIuv5q3hgai/exec";

    async function sendToSheet(userId, displayName) {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ userId, displayName }),
        headers: { "Content-Type": "application/json" }
      });
      const result = await res.json();
      alert("會員資料已處理：" + result.status);
    }

    document.getElementById("login").addEventListener("click", async () => {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login();
      } else {
        const profile = await liff.getProfile();
        sendToSheet(profile.userId, profile.displayName);
      }
    });
  </script>
</body>
</html>
