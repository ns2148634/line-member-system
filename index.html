<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LINE 會員系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h2>會員系統載入中...</h2>

  <script>
    // 初始化 LIFF
    async function main() {
      await liff.init({ liffId: "2007283855-5gl2rX24" });
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      const userId = profile.userId;
      const displayName = profile.displayName;

      // 傳送資料到 Google Apps Script
      fetch("https://script.google.com/macros/s/AKfycbz42B03uKV-ZV-lMxik0-LyTMxmq7pzRYA2XEnYZk4ryaSs8T78HJbYveUxmS3fD4WJVg/exec", {
        method: "POST",
        body: JSON.stringify({ userId, displayName }),
        headers: { "Content-Type": "application/json" }
      })
      .then(res => res.json())
      .then(data => {
        document.body.innerHTML = `<h2>歡迎，${displayName}！</h2><p>已寫入會員系統</p>`;
      })
      .catch(err => {
        document.body.innerHTML = `<p>發生錯誤：${err}</p>`;
      });
    }

    main();
  </script>
</body>
</html>
